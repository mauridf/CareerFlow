# ============================================
# Configuração Redis para CareerFlow
# ============================================

# Rede
bind 0.0.0.0
port 6379
protected-mode no

# Persistência
appendonly yes
appendfsync everysec
aof-use-rdb-preamble yes

# Memória
maxmemory 256mb
maxmemory-policy allkeys-lru

# Snapshots
save 900 1
save 300 10
save 60 10000

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 300
databases 16

# Logging
loglevel notice
logfile ""

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Segurança básica (apenas desenvolvimento)
# Em produção, configurar senha forte
requirepass redisdev